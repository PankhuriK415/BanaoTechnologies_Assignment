{% extends 'hms_core/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-container">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to your HMS dashboard</p>
        </div>
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1rem;">Login to Dashboard</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'signup' %}">Sign up here</a>
        </div>
    </div>
</div>
{% endblock %}
